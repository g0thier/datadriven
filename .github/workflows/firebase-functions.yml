name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - ".github/workflows/firebase-functions.yml"

jobs:
  deploy_functions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Set Firebase secrets
        run: |
          echo "${{ secrets.SMTP_USER }}" | firebase functions:secrets:set SMTP_USER --project ${{ secrets.FIREBASE_PROJECT_ID }}
          echo "${{ secrets.SMTP_PASS }}" | firebase functions:secrets:set SMTP_PASS --project ${{ secrets.FIREBASE_PROJECT_ID }}
          echo "${{ secrets.MAIL_FROM_NAME }}" | firebase functions:secrets:set MAIL_FROM_NAME --project ${{ secrets.FIREBASE_PROJECT_ID }}
          echo "${{ secrets.MAIL_FROM_ADDRESS }}" | firebase functions:secrets:set MAIL_FROM_ADDRESS --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy functions
        run: firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}