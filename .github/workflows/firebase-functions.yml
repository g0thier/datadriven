# Required GitHub Secrets
# Add in: Settings → Secrets and variables → Actions
#
# FIREBASE_TOKEN
# Generate with:
# npm install -g firebase-tools
# firebase login
# firebase login:ci
# Copy the token output into the FIREBASE_TOKEN secret.
#
# FIREBASE_PROJECT_ID
# Your Firebase project ID.
# Find it in Firebase Console → Project Settings
# or via: firebase projects:list

name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - ".github/workflows/firebase-functions.yml"

jobs:
  deploy_functions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: |
          cd functions
          npm ci

      - name: Build functions
        run: |
          cd functions
          npm run build

      - name: Deploy functions
        run: firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
