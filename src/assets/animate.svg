<!--?xml version="1.0" encoding="UTF-8" standalone="no"?-->
<svg width="100%" height="100%" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">

<style>

@keyframes pulseWave{
  0%   { transform: scale(1); }
  12%  { transform: scale(1.06); }
  25%  { transform: scale(1.09); }
  37%  { transform: scale(1.06); }
  50%  { transform: scale(1); }
  62%  { transform: scale(0.97); }
  75%  { transform: scale(0.95); }
  87%  { transform: scale(0.97); }
  100% { transform: scale(1); }
}

#heart path{
  transform-box: fill-box;
  transform-origin: center;
}

/* animation continue */
#heart-layer-2,
#heart-layer-3,
#heart-layer-4,
#heart-layer-5{
  animation: pulseWave 3.2s linear infinite;
}

/* décalage progressif (onde qui traverse le coeur) */
#heart-layer-2{ animation-delay:0s; }
#heart-layer-3{ animation-delay:0.35s; }
#heart-layer-4{ animation-delay:0.7s; }
#heart-layer-5{ animation-delay:1.05s; }

/* grand coeur statique */
#heart-layer-1{
  animation:none;
}

</style>

<g id="heart">

